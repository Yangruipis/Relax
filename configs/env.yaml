env_vars:
  #设置tokennizers是否支持并行
  TOKENIZERS_PARALLELISM: 'true'
  #设置 NCCL Debug日志级别
  NCCL_DEBUG: 'WARN'
  #设置设备最大连接数
  CUDA_DEVICE_MAX_CONNECTIONS: '1'
  #指定 GLOO 框架通信网卡
  GLOO_SOCKET_IFNAME: "eth0"
  #指定 TP 相关通信网卡
  TP_SOCKET_IFNAME: "eth0"
  PYTHONBUFFERED: "16"
  PYTHONPATH: /root/Megatron-LM/:/root/Relax
  CLEARML_SUPPRESS_UPDATE_MESSAGE: "1"
